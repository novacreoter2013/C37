<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Lumina Gold</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --dark-gray: #111;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--white);
        }


.logo {
            display: flex;
            height: 30px;
        }


 .logo-group {
            display: flex;
            height: 80px;
        }




        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            height: 30px;
        }


 .logo-group {
            display: flex;
            height: 80px;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li { margin-left: 25px; }

        .nav-links a {
            text-decoration: none;
            color: var(--white);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .nav-links a:hover { color: var(--gold); }

        .gallery-header {
            text-align: center;
            padding: 60px 5%;
        }

        .gallery-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .gallery-header p {
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 300px;
            gap: 20px;
            padding: 0 8% 80px 8%;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 1px solid #222;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
            border: 2px solid var(--gold);
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
            filter: blur(2px);
        }

        .overlay i {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .overlay span {
            color: var(--white);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }

        @media (max-width: 768px) {
            .wide { grid-column: span 1; }
            .gallery-header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-group">
            <img id="logoImg" src="image-removebg-preview.png" alt="Media Grabber" class="main-logo">
        </div>
        <ul class="nav-links">
            <li><a href="project.html">Home</a></li>
            <li><a href="about1.html">About</a></li>
            <li><a href="gallery1.html" style="color: var(--gold);">Gallery</a></li>
            <li><a href="contact1.html">Contact</a></li>
        </ul>
    </nav>

    <div class="gallery-header">
        <p>Visual Excellence</p>
        <h1>Our Food Gallery</h1>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item wide">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80" alt="Gourmet Platter">
            <div class="overlay">
                <i class="fas fa-search-plus"></i>
                <span>Gourmet Platter</span>
            </div>
        </div>

        <div class="gallery-item tall">
            <img src="https://images.pexels.com/photos/2827263/pexels-photo-2827263.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Signature Seafood">
            <div class="overlay">
                <i class="fas fa-search-plus"></i>
                <span>Signature Seafood</span>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2?auto=format&fit=crop&w=800&q=80" alt="Steak House">
            <div class="overlay">
                <i class="fas fa-search-plus"></i>
                <span>Prime Ribeye</span>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=800&q=80" alt="Classic Pizza">
            <div class="overlay">
                <i class="fas fa-search-plus"></i>
                <span>Truffle Pizza</span>
            </div>
        </div>

        <div class="gallery-item wide">
            <img src="https://images.unsplash.com/photo-1473093226795-af9932fe5856?auto=format&fit=crop&w=800&q=80" alt="Pasta Art">
            <div class="overlay">
                <i class="fas fa-search-plus"></i>
                <span>Artisan Pasta</span>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=800&q=80" alt="Salad">
            <div class="overlay">
                <i class="fas fa-search-plus"></i>
                <span>Garden Fresh</span>
            </div>
        </div>
    </div>

</body>
</html>
